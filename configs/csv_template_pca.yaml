project:
  name: csv_template_factorcov_pca_apt
  output_dir: outputs/csv_template_factorcov_pca_apt

data:
  mode: csv
  returns_csv: demo_data/returns_panel.csv
  states_csv: demo_data/states_panel.csv
  factors_csv: null
  date_col: date

split:
  train_start: 2000-01-31
  test_start: 2010-01-31
  end_date: 2019-11-30
  refit_every: 1
  min_train_months: 60

state:
  columns: [slow_value, fast_vol, curve_slope]

factor_model:
  extractor: pca
  n_factors: 3

mean_model:
  kind: factor_apt
  ridge_lambda: 1.0e-6

covariance_model:
  kind: asset_dcc
  ridge_lambda: 1.0e-6
  variance_floor: 1.0e-6
  correlation_shrink: 0.10
  factor_correlation_mode: independent
  use_persistence: false
  dcc_alpha: 0.02
  dcc_beta: 0.97
  adcc_gamma: 0.005
  variance_lambda: 0.97
  asset_covariance_shrink: 0.10

policy:
  risk_aversion: 8.0
  risky_cap: 1.0
  turnover_penalty: 0.05

comparison:
  cov_modes: [diag, full]
  transaction_cost_bps: 0.0
