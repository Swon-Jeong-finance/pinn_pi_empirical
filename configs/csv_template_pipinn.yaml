optimizer_backend: pipinn

project:
  name: csv_template_pipinn_apt
  output_dir: outputs/csv_template_pipinn_apt

experiment:
  kind: ppgdpo

data:
  mode: csv
  returns_csv: demo_data/returns_panel.csv
  states_csv: demo_data/states_panel.csv
  factors_csv: demo_data/factors_panel.csv
  date_col: date

split:
  train_start: 2000-01-31
  test_start: 2008-01-31
  end_date: 2014-12-31
  refit_every: 12
  min_train_months: 72

state:
  columns: [slow_value, fast_vol, curve_slope]

factor_model:
  extractor: provided
  provided_factor_columns: [MKT, VALUE, BOND]

mean_model:
  kind: factor_apt
  ridge_lambda: 1.0e-6

covariance_model:
  kind: asset_dcc
  ridge_lambda: 1.0e-6
  variance_floor: 1.0e-6
  correlation_shrink: 0.10
  factor_correlation_mode: independent
  use_persistence: false
  dcc_alpha: 0.02
  dcc_beta: 0.97
  adcc_gamma: 0.005
  variance_lambda: 0.97
  asset_covariance_shrink: 0.10

policy:
  risk_aversion: 6.0
  risky_cap: 1.0
  pgd_steps: 80
  step_size: 0.05
  turnover_penalty: 0.05

ppgdpo:
  device: cuda:1
  hidden_dim: 24
  hidden_layers: 2
  epochs: 40
  lr: 0.001
  batch_size: 64
  horizon_steps: 12
  kappa: 1.0
  mc_rollouts: 256
  mc_sub_batch: 256
  utility: crra
  clamp_min_return: -0.95
  clamp_port_ret_max: 5.0
  clamp_wealth_min: 1.0e-8
  clamp_state_std_abs: 8.0
  covariance_mode: full
  cross_strength: 1.0
  eps_bar: 1.0e-6
  newton_ridge: 1.0e-10
  newton_tau: 0.95
  newton_armijo: 1.0e-4
  newton_backtrack: 0.5
  max_newton: 30
  tol_grad: 1.0e-8
  max_line_search: 20
  interior_margin: 1.0e-8
  clamp_neg_jxx_min: 1.0e-12
  train_seed: 17

pipinn:
  device: cuda:1
  dtype: float64
  outer_iters: 6
  eval_epochs: 120
  n_train_int: 4096
  n_train_bc: 1024
  n_val_int: 2048
  n_val_bc: 512
  p_uniform: 0.30
  p_emp: 0.70
  p_tau_near0: 0.30
  lr: 5.0e-4
  grad_clip: 1.0
  w_bc: 20.0
  w_bc_dx: 5.0
  scheduler_factor: 0.5
  scheduler_patience: 3
  min_lr: 1.0e-5
  width: 128
  depth: 3
  covariance_train_mode: dcc_current
  x_domain_quantile_low: 0.001
  x_domain_quantile_high: 0.999
  x_domain_buffer: 0.20

comparison:
  cross_modes: [estimated, zero]
  transaction_cost_bps: 0.0
