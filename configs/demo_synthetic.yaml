project:
  name: demo_synthetic_factorcov_apt
  output_dir: outputs/demo_synthetic_factorcov_apt

data:
  mode: synthetic
  synthetic:
    periods: 240
    assets: 12
    factors: 3
    seed: 17

split:
  train_start: 2000-01-31
  test_start: 2010-01-31
  end_date: 2019-11-30
  refit_every: 1
  min_train_months: 60

state:
  columns: [slow_value, fast_vol, curve_slope]

factor_model:
  extractor: provided
  provided_factor_columns: [MKT, VALUE, BOND]

mean_model:
  kind: factor_apt
  ridge_lambda: 1.0e-6

covariance_model:
  kind: asset_dcc
  ridge_lambda: 1.0e-6
  variance_floor: 1.0e-6
  correlation_shrink: 0.15
  factor_correlation_mode: independent
  use_persistence: false
  dcc_alpha: 0.02
  dcc_beta: 0.97
  adcc_gamma: 0.005
  variance_lambda: 0.97
  asset_covariance_shrink: 0.10

policy:
  risk_aversion: 8.0
  risky_cap: 1.0
  cash_floor: 0.0
  long_only: true
  pgd_steps: 150
  step_size: 0.05
  turnover_penalty: 0.05

comparison:
  cov_modes: [diag, full]
  transaction_cost_bps: 0.0
