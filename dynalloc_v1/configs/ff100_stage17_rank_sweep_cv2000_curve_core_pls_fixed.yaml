experiment:
  name: ff100_stage17_rank_sweep_cv2000_curve_core_pls_fixed
  output_dir: outputs/ff100_stage17_rank_sweep_cv2000_curve_core_pls_fixed
  notes: stage-17 FF100 2000-2019 curve-core only PLS-family suite | ff1 excluded
    | fixed walk-forward evaluation
universe:
  profile: ff100_szbm_base
  bond_hook: curve_core
split:
  profile: cv2000_final20y
selection:
  profile: cv2000_3fold_pls_curve_core_top2
macro:
  profile: bond_curve_core_cv
model:
  profile: base_estimated_pls3
constraints:
  profile: long_only_cash
method:
  profile: suite
comparison:
  profile: selected_rank1_cross_pair
rank_sweep:
  enabled: true
  start_rank: 1
  end_rank: 2
  resume: true
  stop_on_error: false
training:
  iters: 800
  batch_size: 512
  lr: 0.0003
  gamma: 5.0
  residual_policy: true
  residual_ridge: 1.0e-06
  ppgdpo_mc: 256
  ppgdpo_subbatch: 64
  ppgdpo_seed: 123
evaluation:
  walk_forward_mode: fixed
  expanding_window: false
  retrain_every: 12
  refit_iters: 200
  ppgdpo_allow_long_horizon: true
runtime:
  backend: native_stage7
  legacy_entrypoint: legacy/vendor/pgdpo_legacy_v69/run_french49_10y_model_based_latent_varx_fred.py
  legacy_workdir: legacy/vendor/pgdpo_legacy_v69
  seed: 0
  device: cuda
  dtype: float64
  fred_api_key_env: FRED_API_KEY
