experiment:
  name: ff25_stage4_curve_core_selection_suite
  output_dir: outputs/ff25_stage4_curve_core_selection_suite
  notes: stage-4 multi-bond curve core sleeve with bond-aware macro pool, pre-2005 selection and post-2005 final comparison

universe:
  profile: ff25_szbm_curve_core

macro:
  profile: bond_curve_core

model:
  profile: base_estimated_pls3

constraints:
  profile: long_only_cash

method:
  profile: suite

split:
  profile: pre2005_final20y

selection:
  profile: pre2005_3fold_shortlist
  candidate_specs:
    - pca_only_k2
    - pls_H12_k3
    - macro7_only
    - ff5_macro7_pca_k3

comparison:
  profile: final_test20y

training:
  iters: 800
  batch_size: 512
  lr: 0.0003
  gamma: 5.0
  residual_policy: true
  residual_ridge: 1.0e-06
  ppgdpo_mc: 256
  ppgdpo_subbatch: 64
  ppgdpo_seed: 123

evaluation:
  expanding_window: false
  retrain_every: 12
  refit_iters: 200
  ppgdpo_allow_long_horizon: true

runtime:
  backend: native_stage4
  legacy_entrypoint: legacy/vendor/pgdpo_legacy_v69/run_french49_10y_model_based_latent_varx_fred.py
  legacy_workdir: legacy/vendor/pgdpo_legacy_v69
  seed: 0
  device: cuda
  dtype: float64
  fred_api_key_env: FRED_API_KEY
