experiment:
  name: fama_market_stage12_rank_sweep_cv1985_ust10y
  output_dir: outputs/fama_market_stage12_rank_sweep_cv1985_ust10y
  notes: 'stage-12 Fama-market CV-era bond-hook matrix: single long-bond risky menu
    with UST10Y only | fixed-window evaluation'
universe:
  profile: fama_market_base
  bond_hook: ust10y
split:
  profile: cv1985_final15y
selection:
  profile: cv1985_3fold_fullgrid_core_top2
macro:
  profile: bond_curve_core_cv
model:
  profile: base_estimated_pls3
constraints:
  profile: long_only_cash
method:
  profile: suite
comparison:
